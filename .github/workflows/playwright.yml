name: Playwright Tests

on:
  workflow_call:

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    # Bring up postgres, django and the static-content server on the host.
    # Their ports are published (8000, 8001), so the Playwright container can
    # reach them via --network host.
    - name: Set up Docker Compose
      run: docker compose up -d

    - name: Wait for the service to be ready
      run: |
        timeout 180 bash -c 'while ! curl -s http://localhost:8000 > /dev/null; do
          echo "Waiting for the application to be ready..."
          sleep 5
        done'

    # Run Playwright inside the official image — browsers and system deps are
    # already installed, so we skip the flaky `playwright install` download.
    # HOME=/tmp gives corepack/yarn a writable cache when running as the
    # runner UID instead of the image's default pwuser.
    - name: Run Playwright tests
      timeout-minutes: 20
      run: |
        docker run --rm \
          --network host \
          --ipc=host \
          -v "${{ github.workspace }}:/work" \
          -w /work \
          -e CI=true \
          -e HOME=/tmp \
          --user "$(id -u):$(id -g)" \
          mcr.microsoft.com/playwright:v1.58.2-noble \
          bash -c "corepack enable && yarn install --immutable && yarn playwright test --trace on"

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-videos
        path: test-results/**/*.webm
        retention-days: 30

    - name: Dump Docker logs
      if: always()
      run: docker compose logs --no-color > docker-logs.txt 2>&1

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: docker-logs
        path: docker-logs.txt
        retention-days: 30
